<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>WEEK DAYS</title>
</head>
<body>
	<h1>Week Day Finder</h1>
	<button onclick="displayWeekDay()">Click to Enter Day Number</button>
	<script>
		function displayWeekDay(){
			let dayNumber = parseInt(prompt("Enter a number between 1 and 7(1 for Monday, 7 for Sunday):"));
			switch(dayNumber){
			case 1:
				alert("Monday");
				break;
			case 2:
				alert("Tuesday");
				break;
			case 3:
				alert("Wednesday");
				break;
			case 4:
				alert("Thursday");
				break;
			case 5:
				alert("Friday");
				break;
			case 6:
				alert("Saturday");
				break;
			case 7:
				alert("Sunday");
				break;
				default:
				alert("Invalid input! Please enter a number between 1 and 7.");
				break;
			}
		}
	</script>
</body>
</html>
