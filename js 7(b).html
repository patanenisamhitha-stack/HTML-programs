<!doctype html>
<html>
<body>
  <h2>Window Object Example</h2>
  <script>
    // Window properties
    document.write("Inner Width: " + window.innerWidth + "<br>");
    document.write("Inner Height: " + window.innerHeight + "<br>");

    // Window methods
    window.alert("This is window.alert()");
    console.log("This message is from window.console.log()");
  </script>
</body>
</html>
