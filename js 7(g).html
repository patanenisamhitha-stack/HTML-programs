<!doctype html>
<html>
<body>
  <h2>Date Object Example</h2>
  <p id="dateOutput"></p>
  <script>
    let now = new Date();

    let result =
      "Current Date: " + now.toDateString() + "<br>" +
      "Current Time: " + now.toLocaleTimeString() + "<br>" +
      "Year: " + now.getFullYear() + "<br>" +
      "Month (0-11): " + now.getMonth() + "<br>" +
      "Day of Month: " + now.getDate();

    document.getElementById("dateOutput").innerHTML = result;
  </script>
</body>
</html>
