<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loop Example 1 to 10</title>
</head>
<body>
<h1>Print Numbers from 1 to 10</h1>
<button onclick="printUsingFor()">Print Using for loop</button>
<button onclick="printUsingWhile()">Print Using While loop</button>
<button onclick="printUsingDoWhile()">Print Using Do-While loop</button>
<script>
function printUsingFor(){
let output="";
for(let i=1;i<=10;i++){
output += i+"<br>";
}
document.body.innerHTML+="<h3>Using For Loop:</h3>"+output;
}
function printUsingWhile(){
let output="";
let i=1;
while(i<=10){
output+=i+"<br>";
i++;
}
document.body.innerHTML+="<h3>Using While Loop:</h3>"+output;
}
function printUsingDoWhile(){
let output="";
let i=1;
do{
output+=i+"<br>";
i++;
}while(i<=10);
document.body.innerHTML +="<h3>Using Do-While loop</h3>"+output;
}
</script>
</body>
</html>
